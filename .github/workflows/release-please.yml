# Conventional-Commits release automation for the @vigilly/* packages
# (@vigilly/core, @vigilly/browser, @vigilly/node — a single npm workspace).
#
# On every push to main, release-please parses the Conventional Commits since the
# last release and maintains a "release PR" that bumps versions (kept in lockstep
# via linked-versions) + updates CHANGELOGs. The node-workspace plugin also bumps
# the internal `@vigilly/core` dependency ranges in browser/node. When the release
# PR is merged, release-please tags GitHub Releases and this run publishes each
# changed package to npm using OIDC **trusted publishing** (no NPM_TOKEN —
# configure the trusted publisher once per package at
# npmjs.com → @vigilly/<pkg> → Settings → Trusted Publisher, pointing at this
# repo + workflow).
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance + trusted publishing

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # ── Publish only when a release was just created ──────────────────────
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Ensure npm supports trusted publishing
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
        if: ${{ steps.release.outputs.releases_created == 'true' }}
      - run: npm run build
        if: ${{ steps.release.outputs.releases_created == 'true' }}

      # Publish in dependency order; each guarded by that package's release flag.
      - run: npm publish --workspace @vigilly/core --provenance --access public
        if: ${{ steps.release.outputs['packages/core--release_created'] == 'true' }}
      - run: npm publish --workspace @vigilly/browser --provenance --access public
        if: ${{ steps.release.outputs['packages/browser--release_created'] == 'true' }}
      - run: npm publish --workspace @vigilly/node --provenance --access public
        if: ${{ steps.release.outputs['packages/node--release_created'] == 'true' }}
